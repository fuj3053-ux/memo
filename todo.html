<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>待办事项清单</title>
  <style>
    :root {
      color-scheme: light;
      --page-bg: #f4f6f8;
      --panel-bg: #ffffff;
      --text: #20242a;
      --muted: #667085;
      --border: #dde3ea;
      --soft-border: #edf1f5;
      --input-border: #cbd5e1;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --danger: #e11d48;
      --danger-hover: #be123c;
      --shadow: 0 12px 30px rgba(31, 41, 55, 0.12);
      --focus-ring: rgba(37, 99, 235, 0.14);
    }

    body.dark-mode {
      color-scheme: dark;
      --page-bg: #121826;
      --panel-bg: #1c2433;
      --text: #edf2f7;
      --muted: #a6b0c3;
      --border: #2d3748;
      --soft-border: #303b4f;
      --input-border: #44516a;
      --primary: #60a5fa;
      --primary-hover: #3b82f6;
      --danger: #fb7185;
      --danger-hover: #f43f5e;
      --shadow: 0 12px 30px rgba(0, 0, 0, 0.32);
      --focus-ring: rgba(96, 165, 250, 0.22);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      background: var(--page-bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      transition: background 0.2s ease, color 0.2s ease;
    }

    .todo-app {
      width: 100%;
      max-width: 520px;
      background: var(--panel-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 28px;
      transition: background 0.2s ease, border-color 0.2s ease;
    }

    .app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 20px;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.2;
    }

    .theme-toggle {
      flex: 0 0 auto;
      min-height: 40px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      padding: 0 14px;
    }

    .theme-toggle:hover {
      background: var(--soft-border);
    }

    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 18px;
    }

    input {
      flex: 1;
      min-width: 0;
      padding: 12px 14px;
      border: 1px solid var(--input-border);
      border-radius: 6px;
      font-size: 16px;
      outline: none;
      background: var(--panel-bg);
      color: var(--text);
    }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--focus-ring);
    }

    button {
      border: 0;
      border-radius: 6px;
      background: var(--primary);
      color: #ffffff;
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
      padding: 0 18px;
      transition: background 0.2s ease, transform 0.2s ease;
    }

    button:hover {
      background: var(--primary-hover);
    }

    button:active {
      transform: translateY(1px);
    }

    ul {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      max-height: 120px;
      overflow: hidden;
      padding: 12px 0;
      border-bottom: 1px solid var(--soft-border);
      transform-origin: center;
      transition:
        max-height 0.28s ease,
        opacity 0.22s ease,
        padding 0.28s ease,
        transform 0.28s ease,
        border-color 0.22s ease;
    }

    li:last-child {
      border-bottom: 0;
    }

    li.removing {
      max-height: 0;
      opacity: 0;
      padding-top: 0;
      padding-bottom: 0;
      border-bottom-color: transparent;
      transform: translateX(14px) scale(0.98);
    }

    .task {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      cursor: pointer;
    }

    .task input {
      flex: 0 0 auto;
      width: 18px;
      height: 18px;
      padding: 0;
      cursor: pointer;
    }

    .task span {
      overflow-wrap: anywhere;
    }

    .delete-btn {
      flex: 0 0 auto;
      background: var(--danger);
      padding: 8px 10px;
      font-size: 13px;
    }

    .delete-btn:hover {
      background: var(--danger-hover);
    }

    .empty-state {
      color: var(--muted);
      text-align: center;
      padding: 22px 0 6px;
    }

    @media (max-width: 480px) {
      body {
        align-items: flex-start;
        padding: 16px;
      }

      .todo-app {
        padding: 22px;
      }

      .input-row {
        flex-direction: column;
      }

      .app-header {
        align-items: flex-start;
        flex-direction: column;
      }

      button {
        min-height: 44px;
      }
    }
  </style>
</head>
<body>
  <main class="todo-app">
    <div class="app-header">
      <h1>待办事项清单</h1>
      <button class="theme-toggle" type="button" id="theme-toggle" aria-pressed="false">深色模式</button>
    </div>

    <form class="input-row" id="todo-form">
      <input type="text" id="todo-input" placeholder="输入新的待办事项" autocomplete="off">
      <button type="submit">添加</button>
    </form>

    <ul id="todo-list"></ul>
    <p class="empty-state" id="empty-state">暂无待办事项</p>
  </main>

  <script>
    const form = document.getElementById("todo-form");
    const input = document.getElementById("todo-input");
    const list = document.getElementById("todo-list");
    const emptyState = document.getElementById("empty-state");
    const themeToggle = document.getElementById("theme-toggle");
    const todosStorageKey = "todo-items";

    function getTodos() {
      return Array.from(list.querySelectorAll(".task span"), (taskText) => taskText.textContent);
    }

    function saveTodos() {
      localStorage.setItem(todosStorageKey, JSON.stringify(getTodos()));
    }

    function setTheme(isDark) {
      document.body.classList.toggle("dark-mode", isDark);
      themeToggle.textContent = isDark ? "浅色模式" : "深色模式";
      themeToggle.setAttribute("aria-pressed", String(isDark));
      localStorage.setItem("todo-theme", isDark ? "dark" : "light");
    }

    function updateEmptyState() {
      emptyState.style.display = list.children.length === 0 ? "block" : "none";
    }

    function removeTodoItem(item) {
      if (item.classList.contains("removing")) {
        return;
      }

      item.style.maxHeight = `${item.scrollHeight}px`;
      item.querySelectorAll("input, button").forEach((control) => {
        control.disabled = true;
      });

      requestAnimationFrame(() => {
        item.classList.add("removing");
      });

      const finishRemoval = (event) => {
        if (event.propertyName === "max-height") {
          item.removeEventListener("transitionend", finishRemoval);
          item.remove();
          saveTodos();
          updateEmptyState();
        }
      };

      item.addEventListener("transitionend", finishRemoval);
    }

    function createTodoItem(text) {
      const item = document.createElement("li");

      const label = document.createElement("label");
      label.className = "task";

      const checkbox = document.createElement("input");
      checkbox.type = "checkbox";

      const taskText = document.createElement("span");
      taskText.textContent = text;

      const deleteButton = document.createElement("button");
      deleteButton.type = "button";
      deleteButton.className = "delete-btn";
      deleteButton.textContent = "删除";

      checkbox.addEventListener("change", () => {
        if (checkbox.checked) {
          removeTodoItem(item);
        }
      });

      deleteButton.addEventListener("click", () => {
        removeTodoItem(item);
      });

      label.append(checkbox, taskText);
      item.append(label, deleteButton);
      return item;
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();

      const text = input.value.trim();
      if (!text) {
        input.focus();
        return;
      }

      list.append(createTodoItem(text));
      saveTodos();
      input.value = "";
      input.focus();
      updateEmptyState();
    });

    themeToggle.addEventListener("click", () => {
      setTheme(!document.body.classList.contains("dark-mode"));
    });

    const savedTheme = localStorage.getItem("todo-theme");
    const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
    const savedTodos = JSON.parse(localStorage.getItem(todosStorageKey) || "[]");

    savedTodos.forEach((text) => {
      if (typeof text === "string" && text.trim()) {
        list.append(createTodoItem(text));
      }
    });

    setTheme(savedTheme ? savedTheme === "dark" : prefersDark);
    updateEmptyState();
  </script>
</body>
</html>
